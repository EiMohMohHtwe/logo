<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yadanar Shwe Sin Color Preview</title>

  <style>
    :root {
      --bg: #1E3A5F;
      --text: #FFC928;
      --accent: #A51F2D;
      --page-bg: #f2f2f2;
      --card-bg: #ffffff;
      --body-text: #222;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--page-bg);
      color: var(--body-text);
      padding: 24px;
    }

    .container {
      max-width: 1180px;
      margin: auto;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      background: #ddd;
      color: #222;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    button.active {
      background: #111;
      color: #fff;
    }

    .dot-row {
      display: flex;
      gap: 4px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
    }

    .toggle-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toggle-row button {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .toggle-row button.active {
      background: #111;
      color: #fff;
    }

    .custom-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 22px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 7px;
      font-weight: 800;
    }

    .color-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="color"] {
      width: 50px;
      height: 42px;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    input[type="text"] {
      width: 100%;
      height: 42px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1.45fr 0.95fr;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .preview {
      background: var(--bg);
      border-radius: 24px;
      padding: 54px 28px;
      text-align: center;
      box-shadow: 0 12px 34px rgba(0,0,0,0.22);
      min-height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .25s ease;
    }

    .logo-card {
      width: 100%;
      max-width: 740px;
      padding: 54px 26px 46px;
      border-radius: 20px;
      border: 6px solid var(--accent);
      background: rgba(255,255,255,0.035);
    }

    .triangle-wrap {
      width: 174px;
      height: 138px;
      margin: 0 auto 32px;
      position: relative;
    }

    .triangle-main {
      width: 0;
      height: 0;
      border-left: 87px solid transparent;
      border-right: 87px solid transparent;
      border-bottom: 138px solid var(--accent);
      position: absolute;
      left: 0;
      bottom: 0;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.24));
    }

    .triangle-inner {
      width: 0;
      height: 0;
      border-left: 54px solid transparent;
      border-right: 54px solid transparent;
      border-bottom: 88px solid var(--bg);
      position: absolute;
      left: 33px;
      bottom: 18px;
    }

    .triangle-small {
      width: 0;
      height: 0;
      border-left: 31px solid transparent;
      border-right: 31px solid transparent;
      border-bottom: 52px solid var(--text);
      position: absolute;
      left: 56px;
      bottom: 31px;
    }

    .brand {
      color: var(--text);
      font-size: clamp(42px, 7vw, 86px);
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: 1px;
      margin: 0 0 18px;
    }

    .tagline {
      color: rgba(255,255,255,0.92);
      font-size: 17px;
      letter-spacing: 7px;
      text-transform: uppercase;
    }

    .accent-line {
      width: 58%;
      height: 8px;
      background: var(--accent);
      margin: 30px auto 0;
      border-radius: 999px;
    }

    .side-panel {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.10);
    }

    .panel-title {
      font-weight: 900;
      margin-bottom: 14px;
    }

    .sample-box {
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.1);
      margin-bottom: 14px;
    }

    .sample-bg {
      background: var(--bg);
      color: var(--text);
      padding: 27px 18px;
      font-size: 34px;
      font-weight: 900;
      text-align: center;
    }

    .sample-accent {
      background: var(--accent);
      color: #fff;
      padding: 13px;
      text-align: center;
      font-weight: 900;
    }

    .mini-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .mini {
      height: 92px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      border: 1px solid rgba(0,0,0,0.08);
      text-align: center;
      padding: 8px;
    }

    .mini.bg { background: var(--bg); color: white; }
    .mini.text { background: var(--text); color: #111; }
    .mini.accent { background: var(--accent); color: white; }

    .compare {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      margin-top: 12px;
    }

    .compare-card {
      height: 92px;
      border-radius: 12px;
      padding: 8px;
      color: white;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: end;
      justify-content: center;
      text-align: center;
      border: 1px solid rgba(0,0,0,0.12);
      cursor: pointer;
    }

    .codes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .code-card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .swatch {
      height: 58px;
      border-radius: 11px;
      margin-bottom: 10px;
      border: 1px solid rgba(0,0,0,0.12);
    }

    .label {
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .value {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .palette-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      .preview-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      body { padding: 14px; }
      h1 { font-size: 24px; }
      .preview { padding: 30px 14px; min-height: 390px; }
      .logo-card { padding: 38px 14px 34px; }
      .tagline { font-size: 13px; letter-spacing: 3px; }
      .triangle-wrap { transform: scale(0.82); margin-bottom: 16px; }
      .compare { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Color Palette Preview</h1>

    <div class="top-row">
      <div class="buttons" id="buttons"></div>

      <div class="toggle-row">
        <button id="fullModeBtn" class="active">Full Color</button>
        <button id="bgOnlyBtn">Background Only</button>
      </div>
    </div>

    <div class="custom-panel">
      <div class="field">
        <label>Background</label>
        <div class="color-row">
          <input type="color" id="customBgPicker">
          <input type="text" id="customBgText">
        </div>
      </div>

      <div class="field">
        <label>Text</label>
        <div class="color-row">
          <input type="color" id="customTextPicker">
          <input type="text" id="customTextText">
        </div>
      </div>

      <div class="field">
        <label>Accent</label>
        <div class="color-row">
          <input type="color" id="customAccentPicker">
          <input type="text" id="customAccentText">
        </div>
      </div>
    </div>

    <div class="preview-grid">
      <div class="preview">
        <div class="logo-card">
          <div class="triangle-wrap">
            <div class="triangle-main"></div>
            <div class="triangle-inner"></div>
            <div class="triangle-small"></div>
          </div>

          <div class="brand">ရတနာရွှေစင်</div>
          <div class="tagline">Building Materials</div>
          <div class="accent-line"></div>
        </div>
      </div>

      <div class="side-panel">
        <div class="panel-title">Preview</div>

        <div class="sample-box">
          <div class="sample-bg">ရတနာရွှေစင်</div>
          <div class="sample-accent">ACCENT SAMPLE</div>
        </div>

        <div class="mini-row">
          <div class="mini bg">BG</div>
          <div class="mini text">TEXT</div>
          <div class="mini accent">ACCENT</div>
        </div>

        <div class="panel-title">Background Compare</div>
        <div class="compare" id="compare"></div>
      </div>
    </div>

    <div class="codes">
      <div class="code-card">
        <div class="swatch" id="bgSwatch"></div>
        <div class="label">Background</div>
        <div class="value" id="bgCode"></div>
        <div class="palette-strip"><span id="stripBg"></span><span id="stripText"></span><span id="stripAccent"></span></div>
      </div>

      <div class="code-card">
        <div class="swatch" id="textSwatch"></div>
        <div class="label">Text</div>
        <div class="value" id="textCode"></div>
      </div>

      <div class="code-card">
        <div class="swatch" id="accentSwatch"></div>
        <div class="label">Accent</div>
        <div class="value" id="accentCode"></div>
      </div>
    </div>
  </div>

  <script>
    const palettes = [
      { name: "Palette 1", bg: "#162A3A", text: "#FFD54A", accent: "#8B1E2D" },
      { name: "Palette 2", bg: "#1E3A5F", text: "#FFC928", accent: "#A51F2D" },
      { name: "Palette 3", bg: "#2D4F73", text: "#F4B400", accent: "#C62828" },
      { name: "Palette 4", bg: "#466B8F", text: "#FFCF5A", accent: "#D32F2F" },
      { name: "Palette 5", bg: "#607D9B", text: "#FFE082", accent: "#E53935" }
    ];

    const baseText = "#F4B400";
    const baseAccent = "#C62828";
    let backgroundOnly = false;
    let currentIndex = 1;

    const buttons = document.getElementById("buttons");
    const compare = document.getElementById("compare");

    const customBgPicker = document.getElementById("customBgPicker");
    const customTextPicker = document.getElementById("customTextPicker");
    const customAccentPicker = document.getElementById("customAccentPicker");

    const customBgText = document.getElementById("customBgText");
    const customTextText = document.getElementById("customTextText");
    const customAccentText = document.getElementById("customAccentText");

    palettes.forEach((palette, index) => {
      const btn = document.createElement("button");
      btn.innerHTML = `
        <span class="dot-row">
          <span class="dot" style="background:${palette.bg}"></span>
          <span class="dot" style="background:${palette.text}"></span>
          <span class="dot" style="background:${palette.accent}"></span>
        </span>
        ${palette.name}
      `;
      btn.addEventListener("click", () => setPalette(index));
      buttons.appendChild(btn);

      const card = document.createElement("div");
      card.className = "compare-card";
      card.style.background = palette.bg;
      card.textContent = palette.name;
      card.addEventListener("click", () => setPalette(index));
      compare.appendChild(card);
    });

    const customBtn = document.createElement("button");
    customBtn.innerHTML = "Custom";
    customBtn.addEventListener("click", applyCustom);
    buttons.appendChild(customBtn);

    document.getElementById("fullModeBtn").addEventListener("click", () => {
      backgroundOnly = false;
      document.getElementById("fullModeBtn").classList.add("active");
      document.getElementById("bgOnlyBtn").classList.remove("active");
      setPalette(currentIndex);
    });

    document.getElementById("bgOnlyBtn").addEventListener("click", () => {
      backgroundOnly = true;
      document.getElementById("bgOnlyBtn").classList.add("active");
      document.getElementById("fullModeBtn").classList.remove("active");
      setPalette(currentIndex);
    });

    function normalizeHex(value) {
      let hex = value.trim().toUpperCase();
      if (!hex.startsWith("#")) hex = "#" + hex;
      if (/^#[0-9A-F]{6}$/.test(hex)) return hex;
      return null;
    }

    function makePalette(palette) {
      if (!backgroundOnly) return palette;
      return { bg: palette.bg, text: baseText, accent: baseAccent };
    }

    function updateDisplay(p) {
      document.documentElement.style.setProperty("--bg", p.bg);
      document.documentElement.style.setProperty("--text", p.text);
      document.documentElement.style.setProperty("--accent", p.accent);

      document.getElementById("bgCode").textContent = p.bg;
      document.getElementById("textCode").textContent = p.text;
      document.getElementById("accentCode").textContent = p.accent;

      document.getElementById("bgSwatch").style.backgroundColor = p.bg;
      document.getElementById("textSwatch").style.backgroundColor = p.text;
      document.getElementById("accentSwatch").style.backgroundColor = p.accent;

      document.getElementById("stripBg").style.backgroundColor = p.bg;
      document.getElementById("stripText").style.backgroundColor = p.text;
      document.getElementById("stripAccent").style.backgroundColor = p.accent;

      customBgPicker.value = p.bg;
      customTextPicker.value = p.text;
      customAccentPicker.value = p.accent;

      customBgText.value = p.bg;
      customTextText.value = p.text;
      customAccentText.value = p.accent;
    }

    function setActive(index) {
      [...buttons.children].forEach((button, i) => {
        button.classList.toggle("active", i === index);
      });

      [...compare.children].forEach((card, i) => {
        card.style.outline = i === index ? "4px solid #111" : "none";
      });
    }

    function setPalette(index) {
      currentIndex = index;
      const p = makePalette(palettes[index]);
      updateDisplay(p);
      setActive(index);
    }

    function applyCustom() {
      const bg = normalizeHex(customBgText.value) || customBgPicker.value.toUpperCase();
      const text = normalizeHex(customTextText.value) || customTextPicker.value.toUpperCase();
      const accent = normalizeHex(customAccentText.value) || customAccentPicker.value.toUpperCase();

      backgroundOnly = false;
      document.getElementById("fullModeBtn").classList.add("active");
      document.getElementById("bgOnlyBtn").classList.remove("active");

      updateDisplay({ bg, text, accent });
      [...buttons.children].forEach(button => button.classList.remove("active"));
      customBtn.classList.add("active");
      [...compare.children].forEach(card => card.style.outline = "none");
    }

    function syncFromPicker(picker, textInput) {
      textInput.value = picker.value.toUpperCase();
      applyCustom();
    }

    function syncFromText(textInput) {
      const hex = normalizeHex(textInput.value);
      if (hex) {
        textInput.value = hex;
        applyCustom();
      }
    }

    customBgPicker.addEventListener("input", () => syncFromPicker(customBgPicker, customBgText));
    customTextPicker.addEventListener("input", () => syncFromPicker(customTextPicker, customTextText));
    customAccentPicker.addEventListener("input", () => syncFromPicker(customAccentPicker, customAccentText));

    customBgText.addEventListener("input", () => syncFromText(customBgText));
    customTextText.addEventListener("input", () => syncFromText(customTextText));
    customAccentText.addEventListener("input", () => syncFromText(customAccentText));

    setPalette(1);
  </script>
</body>
</html>
